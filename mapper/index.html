<!doctype html>
<html>
  <head>
    <title>Mapper</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="assets/icons.css" />
    <style>
      :root {
        --bg-color: #ccc;
      }
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        background-color: var(--bg-color);
      }

      body {
        line-height: 1.5;
        overflow: hidden;
        anchor-name: --body;
      }

      button {
        padding: 0.5rem;
        text-transform: capitalize;
        cursor: pointer;
      }

      main {
        margin: 1.5% auto;
        padding: 20px;
        width: fit-content;
        background-color: #e3faf5;
        display: flex;
        box-shadow:
          0 4px 8px 0 rgba(0, 0, 0, 0.2),
          0 6px 20px 0 rgba(0, 0, 0, 0.19);
      }

      canvas {
        display: block;
      }

      h1 {
        text-align: center;
      }

      textarea {
        min-width: 500px;
        min-height: 60vh;
      }

      .separator {
        min-width: 50px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-around;
      }

      #item-picker {
        --item-picker-width: 620px;
        --item-picker-scale: 0.5;
        --item-picker-gap: 10px;
        anchor-name: --item-picker-anchor;

        position-anchor: --body;
        align-self: anchor-center;
        justify-self: anchor-center;

        background-color: var(--bg-color);
        width: var(--item-picker-width);

        header {
          display: flex;
          justify-content: center;

          button {
            background-color: var(--bg-color);
            border: none;
          }
        }

        [popover] {
          inset: unset;
          position: fixed;
          position-anchor: --item-picker-anchor;
          top: anchor(bottom);
          left: anchor(left);
          width: calc(var(--item-picker-width) / var(--item-picker-scale));
          height: 550px;

          background-color: var(--bg-color);

          display: flex;
          flex-wrap: wrap;
          gap: var(--item-picker-gap);
          align-content: flex-start;
          padding: var(--item-picker-gap);

          scale: var(--item-picker-scale);
          transform-origin: 0 0;

          button {
            border-radius: 4px;
            background-color: transparent;
          }
        }
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body id="app">
    <div id="item-picker" popover>
      <header></header>
    </div>

    <main>
      <div class="from">
        <textarea name="from"></textarea>
      </div>
      <div class="separator">
        <button popovertarget="item-picker">item picker</button>
        <button name="go">GO!!!</button>
        <button name="generate">GENERATE!!!</button>
      </div>
      <div class="to">
        <textarea name="to" readonly></textarea>
      </div>
    </main>

    <script type="module">
      import * as core from "./src/core";
      import data from "./src/core/data";

      const $ = (selector, el = document) => el.querySelector(selector);
      const $$ = (selector, el = document) => el.querySelectorAll(selector);
      const $ce = (name, props = {}) => Object.assign(document.createElement(name), props);

      const buttonOnClick = (name, handler) => {
        $(`button[name=${name}]`).onclick = (e) => handler(e.target);
      };

      const pickerPopover = $("#item-picker");
      const pickerHeader = $("#item-picker > header");
      const tabs = {};

      for (const [key, item] of data) {
        let tab = tabs[item.category];
        if (!tab) {
          const tabButton = $ce("button");
          tabButton.innerText = item.category;
          tabButton.setAttribute("popovertarget", item.category + "-tabs-tag");
          tabButton.setAttribute("popovertargetaction", "show");
          pickerHeader.appendChild(tabButton);

          tab = $ce("div", { id: item.category + "-tabs-tag" });
          tab.setAttribute("popover", "auto");
          pickerPopover.appendChild(tab);
          tabs[item.category] = tab;
        }

        const button = $ce("button", { meta: { item } });
        button.setAttribute("sprite", key);
        button.setAttribute("commandfor", "app");
        button.setAttribute("command", `--item-selected`);
        tab.appendChild(button);
      }

      const commandHandler = async ({ command, source }) => {
        switch (command) {
          case "--item-selected":
            console.log(source.meta);
            $$("[popover]").forEach((p) => p.hidePopover());
            break;
          case "keydown":
            source.key === "e" && pickerPopover.showPopover();
            break;
        }
      };

      document.addEventListener("keydown", (source) => commandHandler({ command: "keydown", source }));
      $("#app").addEventListener("command", commandHandler);

      const fromTextarea = document.querySelector("textarea[name=from]");
      const goButton = document.querySelector("button[name=go]");
      const generateButton = document.querySelector("button[name=generate]");
      const toTextarea = document.querySelector("textarea[name=to]");

      goButton.onclick = () => {
        const src = fromTextarea.value;
        if (!src) return false;

        if (src[0] == "0") {
          toTextarea.value = JSON.stringify(core.Decoder(src), null, 2);
        } else {
          toTextarea.value = core.Encoder(JSON.parse(src));
        }
        return false;
      };

      generateButton.onclick = () => {
        const blueprint = core.Generate([
          ["firearm-magazine", 500, 500],
          ["iron-gear-wheel", 290, 600],
        ]);
        fromTextarea.value = JSON.stringify(blueprint, null, 2);
        toTextarea.value = core.Encoder(blueprint);
        return false;
      };
    </script>
  </body>
</html>
