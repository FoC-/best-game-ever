<!doctype html>
<html>
  <head>
    <title>Mapper</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="assets/icons.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        background-color: #fae3e8;
        line-height: 1.5;
      }
      canvas {
        display: block;
      }

      #container {
        margin: 1.5% auto;
        padding: 20px;
        width: fit-content;
        background-color: #e3faf5;
        display: flex;
        box-shadow:
          0 4px 8px 0 rgba(0, 0, 0, 0.2),
          0 6px 20px 0 rgba(0, 0, 0, 0.19);
      }

      h1 {
        text-align: center;
      }

      textarea {
        min-width: 500px;
        min-height: 90vh;
      }

      .separator {
        min-width: 50px;
        display: flex;
        align-items: center;
        justify-content: space-around;
      }

      .picker {
        display: flex;
        flex-direction: column;
        background-color: #ccc;
      }

      .picker .header {
        border-bottom: #000 1px solid;
      }

      .picker .header label {
        cursor: pointer;
        padding: 20px;
      }

      .picker .buttons-row {
        display: none;
        flex-wrap: wrap;
      }

      .picker .tabs input[name="tabs-tag"] {
        display: none;
      }

      .picker .tabs input[name="tabs-tag"]:checked + .buttons-row {
        display: flex;
      }

      .hidden {
        display: none !important;
      }

      label[sprite] {
        cursor: pointer;
        position: relative;
      }

      .buttons-row label {
        cursor: pointer;
        scale: 75%;
        outline: 3px solid #000;
        outline-offset: 4px;
      }

      .buttons-row label input[type="radio"] {
        position: absolute;
        left: 0;
        bottom: 0;
        z-index: 10;
        opacity: 0.6;
        width: 100%;
        height: 100%;
        scale: 35%;
      }
    </style>
  </head>
  <body>
    <div class="picker">
      <div class="header"></div>
      <div class="tabs"></div>
    </div>
    <div id="container">
      <div class="from">
        <textarea name="from"></textarea>
      </div>
      <div class="separator">
        <button name="go">GO!!!</button>
        <button name="generate">GENERATE!!!</button>
      </div>
      <div class="to">
        <textarea name="to" readonly></textarea>
      </div>
    </div>

    <script type="module">
      import * as core from "./src/core";
      import data from "./src/core/data";

      const $ = (selector, el = document) => el.querySelector(selector);
      const $$ = (selector, el = document) => el.querySelectorAll(selector);
      const $ce = (name, props = {}) => Object.assign(document.createElement(name), props);

      const buttonOnClick = (name, handler) => {
        $(`button[name=${name}]`).onclick = (e) => handler(e.target);
      };

      const pickerHeader = $(".picker .header");
      const pickerTabs = $(".picker .tabs");
      const tabs = {};

      for (const [key, item] of data) {
        let tab = tabs[item.category];
        if (!tab) {
          const tabHeader = $ce("label");
          tabHeader.innerText = item.category;
          tabHeader.setAttribute("for", item.category + "-tabs-tag");

          pickerHeader.appendChild(tabHeader);
          pickerTabs.appendChild($ce("input", { id: item.category + "-tabs-tag", type: "radio", name: "tabs-tag" }));
          tab = $ce("div", { className: "buttons-row" });
          pickerTabs.appendChild(tab);
          tabs[item.category] = tab;
        }

        const label = $ce("label");
        label.setAttribute("sprite", key);
        tab.appendChild(label);

        const input = $ce("input", { type: "radio", name: "item-picker", value: key });
        label.appendChild(input);
      }

      const fromTextarea = document.querySelector("textarea[name=from]");
      const goButton = document.querySelector("button[name=go]");
      const generateButton = document.querySelector("button[name=generate]");
      const toTextarea = document.querySelector("textarea[name=to]");

      goButton.onclick = () => {
        const src = fromTextarea.value;
        if (!src) return false;

        if (src[0] == "0") {
          toTextarea.value = JSON.stringify(core.Decoder(src), null, 2);
        } else {
          toTextarea.value = core.Encoder(JSON.parse(src));
        }
        return false;
      };

      generateButton.onclick = () => {
        const blueprint = core.Generate([
          ["firearm-magazine", 500, 500],
          ["iron-gear-wheel", 290, 600],
        ]);
        fromTextarea.value = JSON.stringify(blueprint, null, 2);
        toTextarea.value = core.Encoder(blueprint);
        return false;
      };
    </script>
  </body>
</html>
